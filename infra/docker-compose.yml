services:
  postgres:
    image: dockerproxy.net/library/postgres:17-alpine
    environment:
      POSTGRES_DB: smartpot
      POSTGRES_USER: ${POSTGRES_USER:-smartpot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartpot}
    volumes:
      - smartpot_postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  mqtt:
    image: dockerproxy.net/library/eclipse-mosquitto:2.0
    command: ["mosquitto", "-c", "/mosquitto-no-auth.conf"]
    environment:
      MQTT_USERNAME: ${MQTT_USERNAME:-smartpot}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
    volumes:
      - ./mosquitto.conf:/mosquitto-no-auth.conf:ro
      - ./mosquitto.passwd:/mosquitto/config/password_file:ro
      - smartpot_mosquitto:/mosquitto/data
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:1883:1883"
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h 127.0.0.1 -u \"$$MQTT_USERNAME\" -P \"$$MQTT_PASSWORD\" -t '$$SYS/broker/version' -C 1 -W 3 >/dev/null 2>&1"]
      interval: 5s
      timeout: 4s
      retries: 20

  server:
    image: ${SERVER_IMAGE:-ghcr.io/fu1fan/smart-pot-companion-server:latest}
    environment:
      PORT: 8080
      DEMO_TOKEN: ${DEMO_TOKEN:-smart-pot-demo-token}
      SHARE_TOKEN_SECRET: ${SHARE_TOKEN_SECRET:-replace-this-before-public-deployment}
      DATABASE_URL: jdbc:postgresql://postgres:5432/smartpot
      DATABASE_USER: ${POSTGRES_USER:-smartpot}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-smartpot}
      MQTT_HOST: mqtt
      MQTT_PORT: 1883
      MQTT_ENABLED: "true"
      DEEPSEEK_ENDPOINT: ${DEEPSEEK_ENDPOINT:-https://api.deepseek.com/chat/completions}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
    depends_on:
      postgres:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:8080:8080"
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    restart: unless-stopped

  watchtower:
    image: dockerproxy.net/containrrr/watchtower:1.7.1
    command: ["--interval", "60", "--cleanup", "--label-enable"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  smartpot_postgres:
  smartpot_mosquitto:
